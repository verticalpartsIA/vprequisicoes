name: CI — VPRequisições

# ─────────────────────────────────────────────────────────────────────────────
# Dispara em push nas branches ativas, PRs para main e todo dia às 06h UTC
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 03:00 BRT
  workflow_dispatch:       # disparo manual pelo GitHub UI

env:
  NODE_VERSION: "20"
  BASE_URL: "https://requisicoes.vpsistema.com"

# ─────────────────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. TypeScript ────────────────────────────────────────────────────────
  typecheck:
    name: "TypeScript — noEmit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps
      - name: Verificar tipos
        run: npm run typecheck

  # ── 2. ESLint ────────────────────────────────────────────────────────────
  lint:
    name: "ESLint — qualidade de código"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps
      - name: Executar lint
        run: npm run lint
        # Não bloqueia o pipeline — só emite aviso
        continue-on-error: true

  # ── 3. Testes unitários (Vitest) ─────────────────────────────────────────
  unit-tests:
    name: "Vitest — testes unitários"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps
      - name: Executar testes unitários
        run: npm test
      - name: Gerar relatório de cobertura
        run: npm run test:coverage
      - name: Upload cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ── 4. Testes de integração (Vitest) ─────────────────────────────────────
  integration-tests:
    name: "Vitest — testes de integração"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps
      - name: Executar testes de integração
        run: npm run test:integration
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── 4b. Testes de integração Supabase (fluxo real M1→Aprovação→Compras) ──
  supabase-integration:
    name: "Supabase — Fluxo real M1→Cotação→Aprovação→Compras"
    runs-on: ubuntu-latest
    needs: integration-tests
    continue-on-error: true   # Requer Supabase com dados de teste; não bloqueia pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps
      - name: Executar testes Supabase
        # Ficheiro renomeado de supabase-flow* — o vitest.config mesclado excluía esse padrão no CI
        run: npx vitest run packages/core/db/__tests__/m1-through-release.integration.test.ts --reporter=verbose --config vitest.supabase.config.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Upload relatório de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: supabase-integration-report
          path: test-results/
          retention-days: 7

  # ── 5. Testes M5-Frete (módulo especializado) ────────────────────────────
  unit-m5:
    name: "Vitest — M5 Frete"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps
      - name: Executar testes M5
        run: npm run test:m5 -- --reporter=verbose

  # ── 6. E2E — Smoke (sem autenticação) ────────────────────────────────────
  e2e-smoke:
    name: "Playwright — Smoke (site no ar)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps
      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium
      - name: Executar smoke tests
        run: npx playwright test --grep "@smoke" --config=playwright.config.ts
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CI: "true"
      - name: Upload relatório de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7

  # ── 7. E2E — Auth (login com usuário de teste) ───────────────────────────
  e2e-auth:
    name: "Playwright — Autenticação"
    runs-on: ubuntu-latest
    needs: e2e-smoke
    continue-on-error: true   # App pode ainda não estar no ar; não bloqueia pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps
      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium
      - name: Executar testes de auth
        run: npx playwright test --grep "@auth" --config=playwright.config.ts
        env:
          BASE_URL: ${{ env.BASE_URL }}
          TEST_REQUESTER_EMAIL: ${{ secrets.TEST_REQUESTER_EMAIL }}
          TEST_REQUESTER_PASSWORD: ${{ secrets.TEST_REQUESTER_PASSWORD }}
          CI: "true"
      - name: Upload relatório de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-auth-report
          path: playwright-report/
          retention-days: 7

  # ── 8. E2E — Módulos e Formulários ───────────────────────────────────────
  e2e-modules:
    name: "Playwright — Módulos M1-M6"
    runs-on: ubuntu-latest
    needs: e2e-auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps
      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium
      - name: Executar testes de módulos
        run: npx playwright test --grep "@modules" --config=playwright.config.ts
        env:
          BASE_URL: ${{ env.BASE_URL }}
          TEST_REQUESTER_EMAIL: ${{ secrets.TEST_REQUESTER_EMAIL }}
          TEST_REQUESTER_PASSWORD: ${{ secrets.TEST_REQUESTER_PASSWORD }}
          CI: "true"
      - name: Upload relatório de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-modules-report
          path: playwright-report/
          retention-days: 7

  # ── 9. E2E — Fluxo completo M1→Cotação→Aprovação→Compras ────────────────
  e2e-workflow:
    name: "Playwright — Workflow Completo"
    runs-on: ubuntu-latest
    needs: e2e-modules
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps
      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium
      - name: Executar testes de workflow
        run: npx playwright test --grep "@workflow" --config=playwright.config.ts
        env:
          BASE_URL: ${{ env.BASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          TEST_REQUESTER_EMAIL: ${{ secrets.TEST_REQUESTER_EMAIL }}
          TEST_REQUESTER_PASSWORD: ${{ secrets.TEST_REQUESTER_PASSWORD }}
          TEST_APPROVER_EMAIL: ${{ secrets.TEST_APPROVER_EMAIL }}
          TEST_APPROVER_PASSWORD: ${{ secrets.TEST_APPROVER_PASSWORD }}
          CI: "true"
      - name: Upload relatório de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-workflow-report
          path: playwright-report/
          retention-days: 7

  # ── 10. Relatório de falha → Issue automática ────────────────────────────
  report-failure:
    name: "Criar Issue em caso de falha"
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - unit-tests
      - integration-tests
      - supabase-integration
      - e2e-smoke
      - e2e-auth
      - e2e-modules
      - e2e-workflow
    # Só abre issue no schedule diário ou push na main
    if: |
      failure() &&
      (github.event_name == 'schedule' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - name: Abrir Issue de falha no CI
        uses: actions/github-script@v7
        with:
          script: |
            const now    = new Date();
            const dateBR = now.toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });
            const timeBR = now.toLocaleTimeString('pt-BR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit' });

            const jobs = [
              { name: 'TypeScript',                      result: '${{ needs.typecheck.result }}' },
              { name: 'Vitest — Unitários',              result: '${{ needs.unit-tests.result }}' },
              { name: 'Vitest — Integração',             result: '${{ needs.integration-tests.result }}' },
              { name: 'Supabase — Fluxo M1→Compras',     result: '${{ needs.supabase-integration.result }}' },
              { name: 'E2E — Smoke',                     result: '${{ needs.e2e-smoke.result }}' },
              { name: 'E2E — Auth',                      result: '${{ needs.e2e-auth.result }}' },
              { name: 'E2E — Módulos',                   result: '${{ needs.e2e-modules.result }}' },
              { name: 'E2E — Workflow',                  result: '${{ needs.e2e-workflow.result }}' },
            ];

            const failedJobs = jobs
              .filter(j => j.result === 'failure')
              .map(j => `- ❌ **${j.name}**`)
              .join('\n');

            const body = [
              `## 🚨 Falha detectada no pipeline de CI`,
              ``,
              `**Data/hora:** ${dateBR} às ${timeBR} (horário de Brasília)`,
              `**Branch:** \`${context.ref.replace('refs/heads/', '')}\``,
              `**Commit:** [\`${context.sha.substring(0, 7)}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})`,
              `**Evento:** ${context.eventName}`,
              ``,
              `### Jobs com falha`,
              failedJobs,
              ``,
              `### Links úteis`,
              `- 🔍 [Ver execução completa](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `- 🌐 [Verificar produção](https://requisicoes.vpsistema.com)`,
              ``,
              `---`,
              `*Gerado automaticamente pelo CI do VPRequisições* 🤖`,
            ].join('\n');

            // Verifica se já existe issue aberta para não duplicar
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'ci-failure',
              state:  'open',
            });

            if (existingIssues.length === 0) {
              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  `🚨 CI Falhou — ${dateBR}`,
                body,
                labels: ['bug', 'ci-failure'],
              });
            } else {
              // Adiciona comentário na issue existente
              await github.rest.issues.createComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                issue_number: existingIssues[0].number,
                body: `### Nova falha detectada — ${dateBR} às ${timeBR}\n\n${failedJobs}\n\n[Ver execução](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
            }

  # ── 11. Deploy → REMOVIDO deste workflow ────────────────────────────────
  # Deploy é controlado EXCLUSIVAMENTE pelo sdd-pre-deploy.yml
  # (BASE → MEIO → TOPO → DEPLOY). Zero tolerância a bypass.
  # Não adicionar deploy aqui sob nenhuma hipótese.
