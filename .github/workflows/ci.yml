name: CI — VPRequisições

# ─────────────────────────────────────────────────────────────────────────────
# Pipeline de integração contínua.
#
# Deploy: gerenciado pelo Hostinger JS App via Git webhook (push para main
# dispara deploy automático no painel). GitHub Actions NÃO faz deploy.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:

  # ── 1. TypeScript ──────────────────────────────────────────────────────────
  typecheck:
    name: "TypeScript — zero erros"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  # ── 2. Testes unitários ────────────────────────────────────────────────────
  unit-tests:
    name: "Vitest — testes unitários"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test

  # ── 3. Build de validação (sem Docker) ────────────────────────────────────
  build-check:
    name: "Next.js build — valida compilação"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL:           ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_USE_MOCK:          "false"
          NODE_ENV:                      production
