name: Deploy to Hostinger High-Fidelity (FTP)

on:
  push:
    branches:
      - main
      - v11-integrado

jobs:
  build-and-deploy:
    name: Build & Deploy Standalone
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install dependencies
      run: npm ci --legacy-peer-deps

    - name: 🏗️ Build Project (Standalone Mode)
      run: npm run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        NEXT_PUBLIC_USE_MOCK: false

    - name: ✅ Verify Standalone Build
      run: node scripts/verify-standalone.js

    - name: 🧹 Prepare Deployment Directory
      run: |
        mkdir deploy-dist
        cp -r .next/standalone/* deploy-dist/
        cp -r .next/static deploy-dist/.next/
        cp -r public deploy-dist/
        cp server.js deploy-dist/
        # Remove development junk
        rm -rf deploy-dist/src deploy-dist/tests deploy-dist/skills

    - name: 📂 Sync via FTP (Hostinger Stable)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.darkslategrey-chimpanzee-761383.hostingersite.com
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./deploy-dist/
        server-dir: ./public_html/
        exclude: |
          **/.git*
          **/.git*/**
          *.zip
          *.log
          .env*
