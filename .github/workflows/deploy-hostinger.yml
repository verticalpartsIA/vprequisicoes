name: Deploy to Hostinger High-Fidelity (SFTP)

on:
  push:
    branches:
      - main
      - v11-integrado

jobs:
  build-and-deploy:
    name: Build & Deploy Standalone
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install dependencies
      run: npm ci --legacy-peer-deps

    - name: 🏗️ Build Project (Standalone Mode)
      run: npm run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        NEXT_PUBLIC_USE_MOCK: false

    - name: ✅ Verify Standalone Build
      run: node scripts/verify-standalone.js

    - name: 🧹 Prepare Deployment Directory
      run: |
        mkdir deploy-dist
        cp -r .next/standalone/* deploy-dist/
        cp -r .next/static deploy-dist/.next/
        cp -r public deploy-dist/
        cp server.js deploy-dist/
        # Remove junk from standalone if any
        rm -rf deploy-dist/src deploy-dist/tests deploy-dist/skills

    - name: 📂 Sync files via SFTP (Hostinger Professional)
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 65002
        local_path: './deploy-dist/'
        remote_path: '/home/u969661049/domains/darkslategrey-chimpanzee-761383.hostingersite.com/public_html'
        delete_remote_files: true
        args: '-o ConnectTimeout=15 -o ServerAliveInterval=30'

    - name: 🧪 Post-Deploy Healthcheck
      run: |
        echo "Aguardando 10s para o servidor estabilizar..."
        sleep 10
        curl -fSs --max-time 10 https://darkslategrey-chimpanzee-761383.hostingersite.com/api/health || echo "Healthcheck failed, but proceeding..."
