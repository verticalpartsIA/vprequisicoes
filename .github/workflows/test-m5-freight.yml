name: Test M5-Freight

on:
  push:
    branches: [ "main", "feature/m5-freight-module" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run Typecheck
        run: npm run typecheck
      - name: Run M5 Unit Tests
        run: npm run test:m5 -- --reporter=verbose
